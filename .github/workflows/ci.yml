name: CI

# Lint + the pure-logic test suite only - no AWS credentials, no live
# Hugging Face download, no Terraform. simulation/auction.py and
# simulation/bandit.py are deliberately dependency-free specifically so
# this can run in a few seconds on every push without needing any secrets.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest ruff

      - name: Lint
        run: ruff check simulation/ lambda_functions/ dashboard/ tests/

      - name: Run tests
        run: pytest tests/ -v
